name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 每周日凌晨 3 点自动检查
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查链接完整性
        run: |
          bash scripts/check-links.sh
