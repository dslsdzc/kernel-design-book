name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - '第*_*/**'
      - '引言.md'
      - 'book-site/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  book:
    runs-on: ubuntu-latest
    outputs:
      epub: ${{ steps.epub.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: 合并所有章节为 book.md
        run: bash scripts/build.sh

      - name: 编译 EPUB
        run: bash scripts/compile.sh book.md epub || true

      - name: 编译 HTML
        run: bash scripts/compile.sh book.md html || true

      - name: 编译 PDF（需要 xelatex，可能失败）
        run: bash scripts/compile.sh book.md pdf || echo "PDF 编译跳过（无 xelatex）"

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: book-artifacts
          path: |
            book.md
            output/
          retention-days: 30

  site:
    runs-on: ubuntu-latest
    needs: book
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: 安装依赖
        working-directory: ./book-site
        run: npm ci

      - name: 生成网站源文件
        run: bash scripts/build-site.sh

      - name: 构建静态网站
        working-directory: ./book-site
        run: npx rspress build

      - name: 上传网站 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book-site/doc_build

      - name: 下载编译产物（book.md + EPUB/PDF）
        uses: actions/download-artifact@v4
        with:
          name: book-artifacts
          path: ./book-site/doc_build/downloads

  deploy:
    needs: site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
