name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - '第*_*/**'
      - '引言.md'
      - 'scripts/**'
      - 'book-site/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. 安装工具 ──
      - name: 安装 pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ── 2. 合并所有章节并编译多格式 ──
      - name: 合并为 book.md
        run: bash scripts/build.sh

      - name: 编译 EPUB
        run: bash scripts/compile.sh book.md epub || true

      - name: 编译 HTML
        run: bash scripts/compile.sh book.md html || true

      - name: 编译 PDF
        run: sudo apt-get install -y texlive-xetex texlive-lang-chinese 2>/dev/null; bash scripts/compile.sh book.md pdf || echo "PDF 跳过"

      # ── 3. 提交产物回仓库 ──
      - name: 提交 book.md 和编译产物
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add book.md output/
          if ! git diff --cached --quiet; then
            git commit -m "自动构建: book.md + EPUB/PDF/HTML [skip ci]"
            git push
          fi

      # ── 4. 构建 Rspress 网站 ──
      - name: 安装依赖
        working-directory: ./book-site
        run: npm ci

      - name: 生成网站源文件
        run: bash scripts/build-site.sh

      - name: 拷贝下载文件到网站
        run: |
          mkdir -p book-site/doc_build/downloads
          cp output/book.epub book-site/doc_build/downloads/ 2>/dev/null
          cp output/book.pdf  book-site/doc_build/downloads/ 2>/dev/null

      - name: 构建网站
        working-directory: ./book-site
        run: npx rspress build

      # ── 5. 部署 GitHub Pages ──
      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book-site/doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
