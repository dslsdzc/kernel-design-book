name: Deploy Book Site

on:
  push:
    branches: [main]
    paths:
      - '第*_*/**'
      - '引言.md'
      - 'book.md'
      - 'book-site/rspress.config.ts'
      - 'scripts/build-site.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        working-directory: ./book-site
        run: npm ci

      - name: 构建网站源文件
        run: bash scripts/build-site.sh

      - name: 构建静态网站
        working-directory: ./book-site
        run: npx rspress build

      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book-site/doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
